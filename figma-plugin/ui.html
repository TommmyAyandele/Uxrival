<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UX Rival</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #efefef;
      width: 320px;
      min-height: 500px;
      padding: 20px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    
    .logo span:first-child {
      color: #efefef;
    }
    
    .logo span:last-child {
      color: #e8ff47;
    }
    
    .beta-pill {
      background: #e8ff47;
      color: #0a0a0a;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    
    input, textarea {
      width: 100%;
      background: #1a1a1a;
      border: none;
      border-radius: 6px;
      padding: 10px 12px;
      color: #efefef;
      font-size: 14px;
      font-family: Arial, sans-serif;
      transition: all 0.2s;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border: 1px solid #333;
      background: #1f1f1f;
    }
    
    textarea {
      resize: none;
      max-height: 80px;
      min-height: 60px;
    }
    
    .depth-toggle {
      display: flex;
      background: #1a1a1a;
      border-radius: 20px;
      padding: 2px;
    }
    
    .depth-toggle button {
      flex: 1;
      padding: 8px 16px;
      background: transparent;
      border: none;
      border-radius: 18px;
      color: #888;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .depth-toggle button.active {
      background: #e8ff47;
      color: #0a0a0a;
    }
    
    .analyze-btn {
      width: 100%;
      background: #e8ff47;
      color: #0a0a0a;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 16px;
    }
    
    .analyze-btn:hover:not(:disabled) {
      background: #d4e638;
    }
    
    .analyze-btn:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    
    .results {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #333;
    }
    
    .headline {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    
    .score-cards {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      overflow-x: auto;
    }
    
    .score-card {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      min-width: 80px;
      flex-shrink: 0;
    }
    
    .score-name {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    
    .score-value {
      font-size: 20px;
      font-weight: 700;
      color: #e8ff47;
    }
    
    .recommendations {
      margin-bottom: 20px;
    }
    
    .recommendations h4 {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    
    .recommendation-item {
      font-size: 13px;
      color: #efefef;
      line-height: 1.4;
      margin-bottom: 8px;
      padding-left: 12px;
      position: relative;
    }
    
    .recommendation-item:before {
      content: "•";
      position: absolute;
      left: 0;
      color: #e8ff47;
    }
    
    .create-frame-btn {
      width: 100%;
      background: #1a1a1a;
      color: #ffffff;
      border: 1px solid #e8ff47;
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .create-frame-btn:hover {
      background: #e8ff47;
      color: #0a0a0a;
    }
    
    .error {
      color: #f87171;
      font-size: 12px;
      margin-top: 12px;
      padding: 8px 12px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <span>UX</span><span>Rival</span>
    </div>
    <div class="beta-pill">BETA</div>
  </div>
  
  <form id="analysisForm">
    <div class="form-group">
      <label for="industry">Industry</label>
      <input type="text" id="industry" placeholder="e.g. Fintech, Food delivery" required>
    </div>
    
    <div class="form-group">
      <label for="competitors">Competitors</label>
      <textarea id="competitors" placeholder="Paystack&#10;Flutterwave&#10;Stripe" rows="3" required></textarea>
    </div>
    
    <div class="form-group">
      <label>Depth</label>
      <div class="depth-toggle">
        <button type="button" class="depth-btn active" data-depth="quick">Quick</button>
        <button type="button" class="depth-btn" data-depth="deep">Deep</button>
      </div>
    </div>
    
    <button type="submit" class="analyze-btn" id="analyzeBtn">Analyze</button>
  </form>
  
  <div id="results" class="results" style="display: none;">
    <div id="headline" class="headline"></div>
    
    <div class="score-cards" id="scoreCards"></div>
    
    <div class="recommendations">
      <h4>Your Move</h4>
      <div id="recommendationList"></div>
    </div>
    
    <button class="create-frame-btn" id="createFrameBtn">Create Frame in Figma</button>
  </div>
  
  <div id="error" class="error" style="display: none;"></div>
  
  <script>
    let currentData = null;
    let currentDepth = 'quick';
    
    // Depth toggle
    document.querySelectorAll('.depth-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.depth-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentDepth = btn.dataset.depth;
      });
    });
    
    // Form submission
    document.getElementById('analysisForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const industry = document.getElementById('industry').value.trim();
      const competitors = document.getElementById('competitors').value.trim();
      
      if (!industry || !competitors) {
        showError('Please fill in all fields');
        return;
      }
      
      // Show loading state
      const analyzeBtn = document.getElementById('analyzeBtn');
      analyzeBtn.textContent = 'Analyzing...';
      analyzeBtn.disabled = true;
      
      // Hide previous results and errors
      document.getElementById('results').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      
      try {
        const prompt = buildPrompt(industry, competitors, currentDepth);
        
        const response = await fetch('https://uxrival.xyz/api/analyze', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ prompt }),
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'Analysis failed');
        }
        
        currentData = data;
        displayResults(data);
        
      } catch (error) {
        showError(error.message || 'Failed to analyze. Please try again.');
      } finally {
        // Reset button
        analyzeBtn.textContent = 'Analyze';
        analyzeBtn.disabled = false;
      }
    });
    
    // Create frame button
    document.getElementById('createFrameBtn').addEventListener('click', () => {
      if (currentData) {
        parent.postMessage({ pluginMessage: { type: 'create-frame', data: currentData } }, '*');
      }
    });
    
    function buildPrompt(industry, competitors, depth) {
      const comps = competitors.split(/[\n,]+/).map(s => s.trim()).filter(Boolean).slice(0, 3);
      const hasComp = comps.length > 0;
      const dims = depth === "deep" 
        ? ["Onboarding", "Navigation", "Visual Design", "Key Interactions", "Info Architecture", "Accessibility"]
        : ["Onboarding", "Navigation", "Visual Design", "Key Interactions"];
      
      if (hasComp) {
        const eg = comps.map(c => `"${c}":{"r":"Good","n":"5 words"}`).join(",");
        return `Output ONLY valid JSON. No markdown, no explanation, no extra text.

UX analysis of "${industry}". Compare: ${comps.join(", ")}.
Ratings: Excellent|Good|Average|Poor|Weak. Keep ALL text values under 7 words.
"rec" = specific design action for someone building a new product in this space.

Schema:
{"headline":"single punchy sentence max 20 words summarizing biggest opportunity","sum":"brief summary","scores":{"CompetitorName":0-100 per competitor},"comps":${JSON.stringify(comps)},"secs":[{"cat":"Onboarding","rows":[{"dim":"Sign-up","sc":{${eg}},"ins":"gap insight","rec":"your design recommendation"}]}],"opp":"market gap"}

Include "scores" object with overall UX score 0-100 per competitor. Topics (one section each, two rows per section): ${dims.join(", ")}.
JSON only:`;
      }

      return `Output ONLY valid JSON. No markdown, no explanation, no extra text.

UX analysis of "${industry}" category.
Ratings: Excellent|Good|Average|Poor|Weak. Keep ALL text values under 7 words.
"rec" = one concrete design improvement a new product builder should implement.

Schema:
{"headline":"single punchy sentence max 20 words summarizing biggest opportunity","sum":"brief summary","category_score":0-100,"secs":[{"cat":"Onboarding","rows":[{"dim":"Sign-up","find":"current pattern","r":"Good","rec":"design recommendation"}]}],"opp":"market gap"}

Include "category_score" with overall UX score 0-100 for the category. Topics (one section each, two rows per section): ${dims.join(", ")}.
JSON only:`;
    }
    
    function displayResults(data) {
      // Headline
      document.getElementById('headline').textContent = data.headline || 'Analysis Complete';
      
      // Score cards
      const scoreCards = document.getElementById('scoreCards');
      scoreCards.innerHTML = '';
      
      if (data.scores) {
        Object.entries(data.scores).forEach(([name, score]) => {
          const card = document.createElement('div');
          card.className = 'score-card';
          card.innerHTML = `
            <div class="score-name">${name}</div>
            <div class="score-value">${score}</div>
          `;
          scoreCards.appendChild(card);
        });
      } else if (data.category_score) {
        const card = document.createElement('div');
        card.className = 'score-card';
        card.innerHTML = `
          <div class="score-name">Category</div>
          <div class="score-value">${data.category_score}</div>
        `;
        scoreCards.appendChild(card);
      }
      
      // Recommendations (top 3)
      const recommendationList = document.getElementById('recommendationList');
      recommendationList.innerHTML = '';
      
      const recommendations = [];
      if (data.secs) {
        data.secs.forEach(section => {
          if (section.rows) {
            section.rows.forEach(row => {
              if (row.rec) {
                recommendations.push(row.rec);
              }
            });
          }
        });
      }
      
      recommendations.slice(0, 3).forEach(rec => {
        const recItem = document.createElement('div');
        recItem.className = 'recommendation-item';
        recItem.textContent = rec;
        recommendationList.appendChild(recItem);
      });
      
      // Show results
      document.getElementById('results').style.display = 'block';
    }
    
    function showError(message) {
      const errorEl = document.getElementById('error');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }
  </script>
</body>
</html>
